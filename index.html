<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lee Co. · Manufacturing Delivery Dispatch</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');

:root {
  --red: #C8102E; --red-dark: #9e0c24; --red-light: #fde8ec;
  --steel: #1a1f2e; --steel-mid: #2d3447; --steel-light: #3d4560;
  --silver: #e8eaf0; --silver-mid: #c5c9d8; --white: #f9fafc;
  --text: #1a1f2e; --muted: #6b7280;
  --green: #16a34a; --green-light: #dcfce7;
  --blue: #1d4ed8; --blue-light: #dbeafe;
  --amber: #d97706; --amber-light: #fef3c7;
  --danger: #dc2626; --danger-light: #fee2e2;
  --r: 6px; --sh: 0 2px 8px rgba(0,0,0,.12); --shl: 0 8px 24px rgba(0,0,0,.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Barlow', sans-serif; background: var(--silver); color: var(--text); min-height: 100vh; }

/* LOGIN */
#login-screen { min-height:100vh; background:var(--steel); display:flex; align-items:center; justify-content:center; }
.login-box { background:var(--white); border-radius:12px; padding:48px 40px; width:400px; box-shadow:var(--shl); }
.login-logo { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:34px; color:var(--steel); text-align:center; }
.login-logo span { color:var(--red); }
.login-sub { font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; text-align:center; margin-bottom:32px; }
.dept-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
.dept-btn { padding:14px 10px; border-radius:var(--r); border:2px solid var(--silver); background:white;
  font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px; cursor:pointer; color:var(--steel); transition:all .15s; text-align:center; }
.dept-btn:hover { border-color:var(--red); color:var(--red); }
.dept-btn.full { grid-column:1/-1; }
.disp-btn { display:block; width:100%; padding:14px; margin-top:12px; border-radius:var(--r);
  background:var(--steel); color:white; border:none; font-family:'Barlow Condensed',sans-serif;
  font-weight:700; font-size:16px; letter-spacing:1px; cursor:pointer; transition:background .15s; }
.disp-btn:hover { background:var(--red); }
.divider { text-align:center; margin:16px 0 8px; font-size:12px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }

/* DISPATCHER LOGIN PANEL */
.disp-panel { display:none; margin-top:16px; }
.disp-panel.open { display:block; }
.disp-panel input { width:100%; padding:11px 14px; border:1.5px solid var(--silver); border-radius:var(--r);
  font-size:14px; font-family:'Barlow',sans-serif; margin-bottom:10px; outline:none; }
.disp-panel input:focus { border-color:var(--red); }
.login-submit { width:100%; padding:12px; background:var(--red); color:white; border:none;
  border-radius:var(--r); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; cursor:pointer; }
.login-submit:hover { background:var(--red-dark); }
.login-err { color:var(--danger); font-size:13px; margin-top:6px; display:none; text-align:center; }
.login-back { color:var(--muted); font-size:13px; cursor:pointer; text-align:center; margin-top:10px; display:block; }
.login-back:hover { color:var(--red); }

/* HEADER */
header { background:var(--steel); color:white; display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; height:56px; box-shadow:var(--shl); position:sticky; top:0; z-index:100; }
.logo { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:20px; letter-spacing:1px; display:flex; align-items:center; gap:10px; }
.logo span { color:var(--red); }
.logo-tag { font-size:10px; font-weight:400; color:var(--silver-mid); letter-spacing:2px; text-transform:uppercase;
  border-left:1px solid var(--steel-light); padding-left:10px; }
.hdr-right { display:flex; align-items:center; gap:12px; }
.user-badge { font-size:13px; color:var(--silver-mid); }
.btn-logout { background:var(--steel-light); border:none; color:white; padding:6px 14px;
  border-radius:var(--r); font-size:13px; cursor:pointer; font-family:'Barlow',sans-serif; }
.btn-logout:hover { background:var(--red); }

/* TABS */
.nav-tabs { background:var(--steel-mid); display:flex; gap:2px; padding:0 24px; overflow-x:auto; }
.nav-tab { padding:10px 18px; font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:14px;
  letter-spacing:.5px; color:var(--silver-mid); cursor:pointer; border-bottom:3px solid transparent;
  transition:all .15s; text-transform:uppercase; white-space:nowrap; }
.nav-tab:hover { color:white; }
.nav-tab.active { color:white; border-bottom-color:var(--red); }

/* MAIN */
main { padding:24px; max-width:1300px; margin:0 auto; }
.section-hidden { display:none !important; }
.app-hidden { display:none !important; }

/* CARDS */
.card { background:white; border-radius:var(--r); box-shadow:var(--sh); padding:24px; margin-bottom:20px; }
.card-title { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:18px; letter-spacing:.5px;
  color:var(--steel); margin-bottom:20px; padding-bottom:12px; border-bottom:2px solid var(--silver); text-transform:uppercase; }

/* FORM */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-grid .full { grid-column:1/-1; }
.form-group { display:flex; flex-direction:column; gap:6px; }
label { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.5px; text-transform:uppercase; }
input, select, textarea { padding:10px 12px; border:1.5px solid var(--silver); border-radius:var(--r);
  font-family:'Barlow',sans-serif; font-size:14px; color:var(--text); outline:none; transition:border-color .15s; background:white; width:100%; }
input:focus, select:focus, textarea:focus { border-color:var(--red); }
textarea { resize:vertical; min-height:80px; }
.show-other { display:none; margin-top:8px; }
.show-other.vis { display:block; }

/* BUTTONS */
.btn { padding:10px 20px; border-radius:var(--r); border:none; font-family:'Barlow Condensed',sans-serif;
  font-weight:700; font-size:15px; letter-spacing:.5px; cursor:pointer; transition:all .15s; }
.btn-primary { background:var(--red); color:white; }
.btn-primary:hover { background:var(--red-dark); }
.btn-secondary { background:var(--silver); color:var(--steel); }
.btn-secondary:hover { background:var(--silver-mid); }
.btn-success { background:var(--green); color:white; }
.btn-sm { padding:5px 11px; font-size:12px; }
.btn-icon { background:none; border:none; cursor:pointer; font-size:16px; padding:4px 8px; border-radius:4px; }
.btn-icon:hover { background:var(--silver); }

/* BADGES */
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px;
  font-weight:700; font-family:'Barlow Condensed',sans-serif; letter-spacing:.5px; text-transform:uppercase; }
.b-pending { background:var(--amber-light); color:var(--amber); }
.b-scheduled { background:var(--blue-light); color:var(--blue); }
.b-delivered { background:var(--green-light); color:var(--green); }
.b-overdue { background:var(--danger-light); color:var(--danger); }
.b-cancelled { background:var(--silver); color:var(--muted); }

/* SUMMARY CARDS */
.summary-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.sum-card { background:white; border-radius:var(--r); padding:16px 20px; box-shadow:var(--sh); border-left:4px solid transparent; }
.sum-card.pending { border-left-color:var(--amber); }
.sum-card.scheduled { border-left-color:var(--blue); }
.sum-card.overdue { border-left-color:var(--danger); }
.sum-card.delivered { border-left-color:var(--green); }
.sum-num { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:36px; line-height:1; color:var(--steel); }
.sum-lbl { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-top:4px; }

/* TABLE */
.board-toolbar { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
.board-toolbar input, .board-toolbar select { width:auto; padding:7px 11px; font-size:13px; }
.filter-lbl { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead tr { background:var(--steel); color:white; }
thead th { padding:10px 12px; text-align:left; font-family:'Barlow Condensed',sans-serif;
  font-weight:600; font-size:13px; letter-spacing:.5px; text-transform:uppercase; white-space:nowrap; }
tbody tr { border-bottom:1px solid var(--silver); transition:background .1s; }
tbody tr:hover { background:#f8f9ff; }
tbody tr.overdue-row { background:#fff5f5; }
tbody td { padding:9px 12px; vertical-align:middle; }
.td-job { font-weight:600; color:var(--steel); }
.td-muted { color:var(--muted); font-size:12px; }
.table-wrap { overflow-x:auto; }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:white; border-radius:10px; width:560px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:var(--shl); }
.modal-hdr { background:var(--steel); color:white; padding:16px 20px; border-radius:10px 10px 0 0;
  display:flex; align-items:center; justify-content:space-between; }
.modal-hdr h3 { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:18px; text-transform:uppercase; }
.modal-close { background:none; border:none; color:white; font-size:20px; cursor:pointer; line-height:1; }
.modal-body { padding:24px; }
.modal-footer { padding:16px 24px; border-top:1px solid var(--silver); display:flex; gap:10px; justify-content:flex-end; }

/* DETAIL */
.det-row { display:flex; gap:8px; margin-bottom:11px; align-items:flex-start; }
.det-lbl { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; min-width:130px; padding-top:2px; }
.det-val { font-size:14px; color:var(--text); flex:1; }

/* FILE UPLOAD */
.file-drop { border:2px dashed var(--silver-mid); border-radius:var(--r); padding:18px; text-align:center;
  cursor:pointer; transition:border-color .15s; font-size:13px; color:var(--muted); }
.file-drop:hover, .file-drop.drag { border-color:var(--red); color:var(--red); }
.file-drop input { display:none; }
.file-item { display:flex; align-items:center; justify-content:space-between; padding:6px 10px;
  background:var(--silver); border-radius:4px; margin-top:6px; font-size:12px; }
.file-remove { cursor:pointer; color:var(--danger); font-weight:700; background:none; border:none; font-size:14px; }

/* REPORTS */
.report-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
.report-stat { background:white; border-radius:var(--r); padding:20px; box-shadow:var(--sh); text-align:center; }
.report-stat-num { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:42px; color:var(--steel); }
.report-stat-lbl { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-top:4px; }

/* TOAST */
.toast { position:fixed; bottom:24px; right:24px; background:var(--steel); color:white; padding:12px 20px;
  border-radius:var(--r); font-size:14px; box-shadow:var(--shl); z-index:9999;
  opacity:0; transform:translateY(10px); transition:all .3s; pointer-events:none; }
.toast.show { opacity:1; transform:translateY(0); }
.toast.ok { border-left:4px solid var(--green); }
.toast.err { border-left:4px solid var(--danger); }

/* LOADING */
.loading { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
.spinner { display:inline-block; width:24px; height:24px; border:3px solid var(--silver);
  border-top-color:var(--red); border-radius:50%; animation:spin .8s linear infinite; margin-right:8px; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ADMIN */
.admin-table td, .admin-table th { padding:10px 14px; }

/* PRINT */
@media print {
  header, .nav-tabs, .board-toolbar, .btn, .summary-row, #login-screen, .modal-overlay { display:none !important; }
  body { background:white; }
  .card { box-shadow:none; border:1px solid #ddd; }
}

@media (max-width:700px) {
  .form-grid, .summary-row, .report-grid { grid-template-columns:1fr; }
  main { padding:12px; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════ LOGIN ═══════════════════════════ -->
<div id="login-screen">
  <div class="login-box">

    <div class="login-sub">Manufacturing Delivery Dispatch</div>

    <div id="dept-panel">

      <div class="dept-grid">
        <button class="dept-btn" onclick="deptLogin('Warehouse')">📦 Warehouse</button>

<script>
// ═══════════════════════ SUPABASE CONFIG ═══════════════════════
const SB_URL = 'https://yelhykgebazlrvdjbwuj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllbGh5a2dlYmF6bHJ2ZGpid3VqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3NjI3NDgsImV4cCI6MjA5NDMzODc0OH0.PFF_g5fiV7X4byozSRuTDR6BMD_jgp2Y1SrryEjrLI4';

async function sb(method, table, body, params = '') {
  const res = await fetch(`${SB_URL}/rest/v1/${table}${params}`, {
    method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : 'return=representation'
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

const get  = (table, params='') => sb('GET', table, null, params);
const post = (table, body)       => sb('POST', table, body);
const patch = (table, body, params) => sb('PATCH', table, body, params);
const del  = (table, params)     => sb('DELETE', table, null, params);

// ═══════════════════════ STATE ═══════════════════════
let user = null; // { role: 'dept'|'dispatcher'|'admin', dept, name, id }
let editingId = null;
let viewingId = null;
let attachedFiles = [];

// ═══════════════════════ LOGIN ═══════════════════════
function showDispPanel() {
  document.getElementById('dept-panel').style.display = 'none';
  document.getElementById('disp-panel').classList.add('open');
  document.getElementById('login-user').focus();
}
function showDeptPanel() {
  document.getElementById('dept-panel').style.display = 'block';
  document.getElementById('disp-panel').classList.remove('open');
}
function showOtherDept() {
  document.getElementById('other-dept-wrap').style.display = 'block';
  document.getElementById('other-dept-input').focus();
}
function deptLogin(dept) {
  user = { role: 'dept', dept, name: dept };
  enterApp();
}
function otherDeptLogin() {
  const dept = document.getElementById('other-dept-input').value.trim();
  if (!dept) return;
  user = { role: 'dept', dept, name: dept };
  enterApp();
}
async function doLogin() {
  const username = document.getElementById('login-user').value.trim().toLowerCase();
  const password = document.getElementById('login-pass').value;
  document.getElementById('login-err').style.display = 'none';
  try {
    const rows = await get('dispatchers', `?username=eq.${username}&active=eq.true`);
    if (!rows.length || rows[0].password_hash !== password) {
      document.getElementById('login-err').style.display = 'block';
      return;
    }
    const d = rows[0];
    user = { role: d.role, name: d.full_name, id: d.id, dept: null };
    enterApp();
  } catch(e) {
    document.getElementById('login-err').style.display = 'block';
  }
}
function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.remove('app-hidden');
  document.getElementById('user-badge').textContent = user.name;
  buildNav();
}
function logout() {
  user = null; attachedFiles = [];
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').classList.add('app-hidden');
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  showDeptPanel();
}

// ═══════════════════════ NAV ═══════════════════════
function buildNav() {
  const nav = document.getElementById('nav-tabs');
  let tabs = [];
  if (user.role === 'dept') {
    tabs = [
      { id:'submit', label:'+ New Request' },
      { id:'my-requests', label:'My Requests' }
    ];
  } else {
    tabs = [
      { id:'board', label:'📋 Dispatch Board' },
      { id:'runsheet', label:'🖨 Run Sheet' },
      { id:'submit', label:'+ New Request' },
    ];
    if (user.role === 'admin') {
      tabs.push({ id:'reports', label:'📊 Reports' });
      tabs.push({ id:'admin', label:'⚙️ Admin' });
    }
  }
  nav.innerHTML = tabs.map(t =>
    `<div class="nav-tab" id="tab-${t.id}" onclick="showTab('${t.id}')">${t.label}</div>`
  ).join('');
  showTab(tabs[0].id);
}

function showTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const el = document.getElementById('tab-' + tab);
  if (el) el.classList.add('active');
  const main = document.getElementById('main-content');
  const renders = {
    'submit':      renderSubmit,
    'my-requests': renderMyRequests,
    'board':       renderBoard,
    'runsheet':    renderRunSheet,
    'reports':     renderReports,
    'admin':       renderAdmin,
  };
  if (renders[tab]) { main.innerHTML = '<div class="loading"><span class="spinner"></span> Loading...</div>'; renders[tab](); }
}

function handleFiles(files) {
  Array.from(files).forEach(f => attachedFiles.push({ name: f.name, size: f.size }));
  renderFileList();
}
function renderFileList() {
  const el = document.getElementById('file-list');
  if (!el) return;
  el.innerHTML = attachedFiles.map((f,i) =>
    `<div class="file-item"><span>📎 ${f.name}</span><button class="file-remove" onclick="removeFile(${i})">✕</button></div>`
  ).join('');

function removeFile(i) { attachedFiles.splice(i,1); renderFileList(); }

function clearSubmitForm() {
  ['f-job','f-wo','f-fab','f-addr','f-contact','f-weight','f-notes'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  const fd = document.getElementById('f-date'); if(fd) fd.value = today();
  const ft = document.getElementById('f-type'); if(ft) ft.value = '';
  attachedFiles = []; renderFileList();
}

async function submitRequest() {
  let dept = document.getElementById('f-dept').value;
  if (dept === 'Other') dept = (document.getElementById('f-dept-other').value || '').trim();
  const date = document.getElementById('f-date').value;
  const job  = document.getElementById('f-job').value.trim();
  if (!dept) { toast('Please select a department.','err'); return; }
  if (!date) { toast('Please select a delivery date.','err'); return; }
  if (!job)  { toast('Please enter a job name.','err'); return; }

  const body = {
    dept, delivery_date: date, job_name: job,
    wo_number: document.getElementById('f-wo').value.trim(),
    fab_pro: document.getElementById('f-fab').value.trim(),
    delivery_type: document.getElementById('f-type').value,
    address: document.getElementById('f-addr').value.trim(),
    site_contact: document.getElementById('f-contact').value.trim(),
    weight_notes: document.getElementById('f-weight').value.trim(),
    special_notes: document.getElementById('f-notes').value.trim(),
    attachments: attachedFiles,
    status: 'Pending',
    submitted_by: user.name
  };
  try {
    await post('delivery_requests', body);
    toast('Request submitted!', 'ok');
    clearSubmitForm();
    if (user.role === 'dept') showTab('my-requests');
  } catch(e) { toast('Error submitting. Try again.','err'); }

async function renderBoard() {
  let rows;
  try { rows = await get('delivery_requests', '?order=delivery_date.asc'); }
  catch(e) { document.getElementById('main-content').innerHTML = '<div class="card"><p style="color:var(--danger)">Error loading board.</p></div>'; return; }

  const pending   = rows.filter(r => r.status === 'Pending').length;
  const scheduled = rows.filter(r => r.status === 'Scheduled').length;
  const overdue   = rows.filter(r => isOverdue(r)).length;
  const delivered = rows.filter(r => r.status === 'Delivered').length;

  document.getElementById('main-content').innerHTML = `
  <div class="summary-row">
    <div class="sum-card pending"><div class="sum-num">${pending}</div><div class="sum-lbl">Pending</div></div>
    <div class="sum-card scheduled"><div class="sum-num">${scheduled}</div><div class="sum-lbl">Scheduled</div></div>
    <div class="sum-card overdue"><div class="sum-num">${overdue}</div><div class="sum-lbl">Overdue</div></div>
    <div class="sum-card delivered"><div class="sum-num">${delivered}</div><div class="sum-lbl">Delivered</div></div>
  </div>
  <div class="card">
    <div class="card-title">Dispatch Board</div>
    <div class="board-toolbar">
      <span class="filter-lbl">Date:</span>
      <input type="date" id="bd-date" onchange="applyBoardFilter()">
      <span class="filter-lbl">Status:</span>
      <select id="bd-status" onchange="applyBoardFilter()">
        <option value="">All</option>
        <option>Pending</option><option>Scheduled</option><option>Delivered</option><option>Overdue</option><option>Cancelled</option>
      </select>
      <span class="filter-lbl">Driver:</span>
      <select id="bd-driver" onchange="applyBoardFilter()">
        <option value="">All Drivers</option>
        <option>Bob Johnson</option><option>Brandon Jones</option><option>Michael Gropp</option>
        <option>Ron Gibson</option><option>Ray Swimm</option><option>Shop / Other</option>
      </select>
      <button class="btn btn-secondary btn-sm" onclick="renderBoard()">Clear</button>
      <button class="btn btn-primary btn-sm" onclick="showTab('runsheet')">🖨 Run Sheet</button>
    </div>
    <div class="table-wrap" id="board-table">${boardTableHtml(rows)}</div>
  </div>`;
}

function applyBoardFilter() {
  const date   = document.getElementById('bd-date').value;
  const status = document.getElementById('bd-status').value;
  const driver = document.getElementById('bd-driver').value;
  let params = '?order=delivery_date.asc';
  if (date)   params += `&delivery_date=eq.${date}`;
  if (status && status !== 'Overdue') params += `&status=eq.${status}`;
  if (driver) params += `&driver=eq.${encodeURIComponent(driver)}`;
  get('delivery_requests', params).then(rows => {
    let filtered = rows;
    if (status === 'Overdue') filtered = rows.filter(r => isOverdue(r));
    document.getElementById('board-table').innerHTML = boardTableHtml(filtered);
  });
}

function boardTableHtml(rows) {
  if (!rows.length) return '<p style="color:var(--muted);padding:20px 0;">No deliveries match the current filters.</p>';
  return `<table>
    <thead><tr>
      <th>Date</th><th>Dept</th><th>Job</th><th>WO #</th><th>Fab Pro</th><th>Type</th>
      <th>Address</th><th>Contact</th><th>Weight</th><th>Status</th>
      <th>Driver</th><th>Truck</th><th>Time</th><th></th>
    </tr></thead>
    <tbody>${rows.map(r => `
      <tr class="${isOverdue(r)?'overdue-row':''}">
        <td style="white-space:nowrap;">${fmtDate(r.delivery_date)}</td>
        <td class="td-muted">${r.dept}</td>
        <td class="td-job">${r.job_name}</td>
        <td class="td-muted">${r.wo_number||'—'}</td>
        <td class="td-muted">${r.fab_pro||'—'}</td>
        <td style="white-space:nowrap;">${r.delivery_type||'—'}</td>
        <td style="max-width:150px;font-size:12px;">${r.address||'—'}</td>
        <td>${r.site_contact||'—'}</td>
        <td>${r.weight_notes||'—'}</td>
        <td>${badgeHtml(r)}</td>
        <td>${r.driver||'<span class="td-muted">—</span>'}</td>
        <td>${r.truck||'<span class="td-muted">—</span>'}</td>
        <td>${r.confirmed_time?fmtTime(r.confirmed_time):'<span class="td-muted">TBD</span>'}</td>
        <td style="white-space:nowrap;">
          <button class="btn btn-primary btn-sm" onclick="openAssign('${r.id}')">Assign</button>
          <button class="btn btn-secondary btn-sm" onclick="viewRequest('${r.id}')">View</button>
        </td>
      </tr>`).join('')}
    </tbody></table>`;
}

async function loadRunSheet() {
  const date   = document.getElementById('rs-date').value;
  const driver = document.getElementById('rs-driver').value;
  let params = `?delivery_date=eq.${date}&status=neq.Cancelled&order=confirmed_time.asc.nullslast`;
  if (driver) params += `&driver=eq.${encodeURIComponent(driver)}`;
  const rows = await get('delivery_requests', params);

  const byDriver = {};
  rows.forEach(r => {
    const d = r.driver || 'Unassigned';
    if (!byDriver[d]) byDriver[d] = [];
    byDriver[d].push(r);
  });

  const el = document.getElementById('rs-content');
  if (!rows.length) { el.innerHTML = '<p style="color:var(--muted);padding:20px 0;">No deliveries scheduled for this date.</p>'; return; }

  el.innerHTML = Object.entries(byDriver).map(([driverName, runs]) => `
    <div style="margin-bottom:32px;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--steel);
        border-bottom:3px solid var(--red);padding-bottom:8px;margin-bottom:16px;text-transform:uppercase;">
        ${driverName}${runs[0].truck ? ' — Truck #' + runs[0].truck : ''}
        <span style="font-size:14px;font-weight:400;color:var(--muted);margin-left:12px;">${fmtDate(date)}</span>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>#</th><th>Time</th><th>Job</th><th>WO / Fab Pro</th><th>Type</th>
          <th>Address</th><th>Contact</th><th>Weight</th><th>Notes</th><th>Attachments</th></tr></thead>
        <tbody>${runs.map((r,i) => `
          <tr>
            <td style="font-weight:700;color:var(--red);">${i+1}</td>
            <td style="font-weight:700;white-space:nowrap;">${r.confirmed_time?fmtTime(r.confirmed_time):'TBD'}</td>
            <td class="td-job">${r.job_name}</td>
            <td class="td-muted">${[r.wo_number,r.fab_pro].filter(Boolean).join(' / ')||'—'}</td>
            <td>${r.delivery_type||'—'}</td>
            <td style="font-size:12px;">${r.address||'—'}</td>
            <td>${r.site_contact||'—'}</td>
            <td>${r.weight_notes||'—'}</td>
            <td style="font-size:12px;">${[r.special_notes,r.dispatcher_notes].filter(Boolean).join(' | ')||'—'}</td>
            <td>${r.attachments&&r.attachments.length?r.attachments.map(a=>'📎 '+a.name).join('<br>'):'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>`).join('');
}

    ${r.attachments&&r.attachments.length?`<div class="det-row"><span class="det-lbl">Attachments</span><span class="det-val">${r.attachments.map(a=>'📎 '+a.name).join('<br>')}</span></div>`:''}`;

  document.getElementById('m-driver').value  = r.driver || '';
  document.getElementById('m-truck').value   = r.truck || '';
  document.getElementById('m-time').value    = r.confirmed_time || '';
  document.getElementById('m-status').value  = r.status || 'Pending';
  document.getElementById('m-notes').value   = r.dispatcher_notes || '';
  document.getElementById('m-date').value    = r.delivery_date || '';
  driverOther();
  document.getElementById('assign-modal').classList.add('open');

async function saveAssign() {
  let driver = document.getElementById('m-driver').value;
  if (driver === 'Shop / Other') {
    const other = document.getElementById('m-driver-other').value.trim();
    if (other) driver = other;
  }
  const body = {
    driver,
    truck:            document.getElementById('m-truck').value.trim(),
    confirmed_time:   document.getElementById('m-time').value,
    status:           document.getElementById('m-status').value,
    dispatcher_notes: document.getElementById('m-notes').value.trim(),
    delivery_date:    document.getElementById('m-date').value,
    updated_at:       new Date().toISOString()
  };
  try {
    await patch('delivery_requests', body, `?id=eq.${editingId}`);
    closeModal('assign-modal');
    toast('Assignment saved!', 'ok');
    renderBoard();
  } catch(e) { toast('Error saving. Try again.','err'); }
}

    <div class="det-row"><span class="det-lbl">Address</span><span class="det-val">${r.address||'—'}</span></div>
    <div class="det-row"><span class="det-lbl">Site Contact</span><span class="det-val">${r.site_contact||'—'}</span></div>
    <div class="det-row"><span class="det-lbl">Weight / Load</span><span class="det-val">${r.weight_notes||'—'}</span></div>
    <div class="det-row"><span class="det-lbl">Notes</span><span class="det-val">${r.special_notes||'—'}</span></div>
    ${r.attachments&&r.attachments.length?`<div class="det-row"><span class="det-lbl">Attachments</span><span class="det-val">${r.attachments.map(a=>'📎 '+a.name).join('<br>')}</span></div>`:''}
    <hr style="margin:16px 0;border:none;border-top:1px solid var(--silver);">
    <div class="det-row"><span class="det-lbl">Driver</span><span class="det-val">${r.driver||'Unassigned'}</span></div>
    <div class="det-row"><span class="det-lbl">Truck #</span><span class="det-val">${r.truck||'—'}</span></div>
    <div class="det-row"><span class="det-lbl">Confirmed Time</span><span class="det-val">${r.confirmed_time?fmtTime(r.confirmed_time):'TBD'}</span></div>
    ${(user.role==='dispatcher'||user.role==='admin')&&r.dispatcher_notes?`<div class="det-row"><span class="det-lbl">Dispatcher Notes</span><span class="det-val">${r.dispatcher_notes}</span></div>`:''}
    <div class="det-row"><span class="det-lbl">Submitted</span><span class="det-val">${new Date(r.submitted_at).toLocaleString()}</span></div>`;

  const eb = document.getElementById('view-edit-btn');
  eb.style.display = (r.status === 'Pending' && user.role === 'dept') ? 'inline-block' : 'none';
  document.getElementById('view-modal').classList.add('open');
}

function editFromView() { closeModal('view-modal'); openEditModal(viewingId); }

async function openEditModal(id) {
  editingId = id;
  const rows = await get('delivery_requests', `?id=eq.${id}`);
  const r = rows[0]; if (!r) return;
  document.getElementById('e-date').value    = r.delivery_date;
  document.getElementById('e-type').value    = r.delivery_type;
  document.getElementById('e-job').value     = r.job_name;
  document.getElementById('e-wo').value      = r.wo_number;
  document.getElementById('e-fab').value     = r.fab_pro;
  document.getElementById('e-addr').value    = r.address;
  document.getElementById('e-contact').value = r.site_contact;
  document.getElementById('e-weight').value  = r.weight_notes;
  document.getElementById('e-notes').value   = r.special_notes;
  document.getElementById('edit-modal').classList.add('open');
}

async function saveEdit() {
  const body = {
    delivery_date:  document.getElementById('e-date').value,
    delivery_type:  document.getElementById('e-type').value,
    job_name:       document.getElementById('e-job').value.trim(),
    wo_number:      document.getElementById('e-wo').value.trim(),
    fab_pro:        document.getElementById('e-fab').value.trim(),
    address:        document.getElementById('e-addr').value.trim(),
    site_contact:   document.getElementById('e-contact').value.trim(),
    weight_notes:   document.getElementById('e-weight').value.trim(),
    special_notes:  document.getElementById('e-notes').value.trim(),
    updated_at:     new Date().toISOString()
  };
  try {
    await patch('delivery_requests', body, `?id=eq.${editingId}`);
    closeModal('edit-modal');
    toast('Request updated!','ok');
    renderMyRequests();
  } catch(e) { toast('Error saving.','err'); }
}

function editRequest(id) { openEditModal(id); }

// ═══════════════════════ REPORTS (ADMIN) ═══════════════════════
async function renderReports() {
  document.getElementById('main-content').innerHTML = `
  <div class="card">
    <div class="card-title">Reports</div>
    <div class="board-toolbar">
      <span class="filter-lbl">From:</span><input type="date" id="rp-from">
      <span class="filter-lbl">To:</span><input type="date" id="rp-to" value="${today()}">
      <button class="btn btn-primary btn-sm" onclick="loadReports()">Run Report</button>
      <button class="btn btn-secondary btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
    <div id="rp-content"><p style="color:var(--muted);">Select a date range and click Run Report.</p></div>
  </div>`;

  // Default: last 30 days
  const from = new Date(); from.setDate(from.getDate()-30);
  document.getElementById('rp-from').value = from.toISOString().split('T')[0];
  loadReports();
}

let reportData = [];
async function loadReports() {
  const from = document.getElementById('rp-from').value;
  const to   = document.getElementById('rp-to').value;
  if (!from || !to) { toast('Set both dates.','err'); return; }
  reportData = await get('delivery_requests', `?delivery_date=gte.${from}&delivery_date=lte.${to}&order=delivery_date.asc`);
  const rows = reportData;

  const total     = rows.length;
  const delivered = rows.filter(r=>r.status==='Delivered').length;
  const pending   = rows.filter(r=>r.status==='Pending').length;
  const cancelled = rows.filter(r=>r.status==='Cancelled').length;
  const overdue   = rows.filter(r=>isOverdue(r)).length;

  // By driver
  const byDriver = {};
  rows.forEach(r => { const d=r.driver||'Unassigned'; byDriver[d]=(byDriver[d]||0)+1; });
  // By dept
  const byDept = {};
  rows.forEach(r => { byDept[r.dept]=(byDept[r.dept]||0)+1; });

  document.getElementById('rp-content').innerHTML = `
    <div class="report-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:24px;">
      <div class="report-stat"><div class="report-stat-num">${total}</div><div class="report-stat-lbl">Total</div></div>
      <div class="report-stat"><div class="report-stat-num" style="color:var(--green)">${delivered}</div><div class="report-stat-lbl">Delivered</div></div>
      <div class="report-stat"><div class="report-stat-num" style="color:var(--amber)">${pending}</div><div class="report-stat-lbl">Pending</div></div>
      <div class="report-stat"><div class="report-stat-num" style="color:var(--danger)">${overdue}</div><div class="report-stat-lbl">Overdue</div></div>
      <div class="report-stat"><div class="report-stat-num" style="color:var(--muted)">${cancelled}</div><div class="report-stat-lbl">Cancelled</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
      <div>
        <div class="card-title" style="font-size:14px;margin-bottom:12px;">By Driver</div>
        <table class="admin-table">
          <thead><tr><th>Driver</th><th>Deliveries</th></tr></thead>
          <tbody>${Object.entries(byDriver).sort((a,b)=>b[1]-a[1]).map(([d,n])=>`<tr><td>${d}</td><td style="font-weight:700;">${n}</td></tr>`).join('')}</tbody>
        </table>
      </div>
      <div>
        <div class="card-title" style="font-size:14px;margin-bottom:12px;">By Department</div>
        <table class="admin-table">
          <thead><tr><th>Department</th><th>Requests</th></tr></thead>
          <tbody>${Object.entries(byDept).sort((a,b)=>b[1]-a[1]).map(([d,n])=>`<tr><td>${d}</td><td style="font-weight:700;">${n}</td></tr>`).join('')}</tbody>
        </table>
      </div>
    </div>
    <div class="card-title" style="font-size:14px;margin-bottom:12px;">All Deliveries in Range</div>
    <div class="table-wrap">${tableHtml(rows, false)}</div>`;
}

function exportCSV() {
  if (!reportData.length) { toast('Run a report first.','err'); return; }
  const cols = ['delivery_date','dept','job_name','wo_number','fab_pro','delivery_type','address','site_contact','weight_notes','status','driver','truck','confirmed_time','special_notes','dispatcher_notes','submitted_by','submitted_at'];
  const headers = cols.join(',');
  const csv = [headers, ...reportData.map(r => cols.map(c => `"${(r[c]||'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `dispatch_report_${today()}.csv`;
  a.click();
}

// ═══════════════════════ ADMIN ═══════════════════════
async function renderAdmin() {
  const dispatchers = await get('dispatchers', '?order=created_at.asc');
  document.getElementById('main-content').innerHTML = `
  <div class="card">
    <div class="card-title">Dispatcher Accounts</div>
    <div style="margin-bottom:16px;">
      <button class="btn btn-primary btn-sm" onclick="document.getElementById('add-disp-modal').classList.add('open')">+ Add Dispatcher</button>
    </div>
    <div class="table-wrap">
    <table class="admin-table">
      <thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Active</th><th></th></tr></thead>
      <tbody>${dispatchers.map(d=>`
        <tr>
          <td style="font-weight:600;">${d.full_name}</td>
          <td class="td-muted">${d.username}</td>
          <td><span class="badge ${d.role==='admin'?'b-scheduled':'b-pending'}">${d.role}</span></td>
          <td>${d.active?'✅':'❌'}</td>
          <td>
            <button class="btn btn-secondary btn-sm" onclick="toggleDispatcher('${d.id}',${d.active})">${d.active?'Deactivate':'Activate'}</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}

async function saveDispatcher() {
  const body = {
    full_name:     document.getElementById('nd-name').value.trim(),
    username:      document.getElementById('nd-user').value.trim().toLowerCase(),
    password_hash: document.getElementById('nd-pass').value,
    role:          document.getElementById('nd-role').value,
    active:        true
  };
  if (!body.full_name || !body.username || !body.password_hash) { toast('Fill all fields.','err'); return; }
  try {
    await post('dispatchers', body);
    closeModal('add-disp-modal');
    toast('Account created!','ok');
    renderAdmin();
  } catch(e) { toast('Username may already exist.','err'); }
}

async function toggleDispatcher(id, active) {
  await patch('dispatchers', { active: !active }, `?id=eq.${id}`);
  toast(active ? 'Account deactivated.' : 'Account activated.', 'ok');
  renderAdmin();
}

// ═══════════════════════ SHARED TABLE ═══════════════════════
function tableHtml(rows, isBoard=false) {
  if (!rows.length) return '<p style="color:var(--muted);padding:20px 0;">No records found.</p>';
  return `<div class="table-wrap"><table>
    <thead><tr>
      <th>Date</th><th>Job</th><th>WO #</th><th>Fab Pro</th><th>Type</th><th>Status</th>
      <th>Driver</th><th>Time</th><th></th>
    </tr></thead>
    <tbody>${rows.map(r=>`
      <tr class="${isOverdue(r)?'overdue-row':''}">
        <td style="white-space:nowrap;">${fmtDate(r.delivery_date)}</td>
        <td class="td-job">${r.job_name}</td>
        <td class="td-muted">${r.wo_number||'—'}</td>
        <td class="td-muted">${r.fab_pro||'—'}</td>
        <td>${r.delivery_type||'—'}</td>
        <td>${badgeHtml(r)}</td>
        <td>${r.driver||'<span class="td-muted">Unassigned</span>'}</td>
        <td>${r.confirmed_time?fmtTime(r.confirmed_time):'<span class="td-muted">TBD</span>'}</td>
        <td style="white-space:nowrap;">
          <button class="btn btn-secondary btn-sm" onclick="viewRequest('${r.id}')">View</button>
          ${r.status==='Pending'&&user.role==='dept'?`<button class="btn btn-primary btn-sm" onclick="editRequest('${r.id}')">Edit</button>`:''}
          ${(user.role==='dispatcher'||user.role==='admin')?`<button class="btn btn-primary btn-sm" onclick="openAssign('${r.id}')">Assign</button>`:''}
        </td>
      </tr>`).join('')}
    </tbody></table></div>`;
}

// ═══════════════════════ HELPERS ═══════════════════════
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function isOverdue(r) {
  return !['Delivered','Cancelled'].includes(r.status) && r.delivery_date < today();
}
function badgeHtml(r) {
  if (isOverdue(r)) return '<span class="badge b-overdue">Overdue</span>';
  const m = { Pending:'b-pending', Scheduled:'b-scheduled', Delivered:'b-delivered', Cancelled:'b-cancelled' };
  return `<span class="badge ${m[r.status]||''}">${r.status}</span>`;
}
function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return `${m}/${d}/${y}`;
}
function fmtTime(t) {
  if (!t) return '';
  const [h,min] = t.split(':');
  const hr = parseInt(h);
  return `${hr>12?hr-12:hr||12}:${min} ${hr>=12?'PM':'AM'}`;
}
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(()=>t.className='toast', 3000);
}
</script>
