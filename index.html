<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCB Dispatch · Manufacturing Delivery</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');

:root {
  --yellow: #F5C200;
  --yellow-dark: #C49A00;
  --yellow-light: #FFF8D6;
  --gun: #2A2C30;
  --gun-mid: #3A3D42;
  --gun-light: #4E5157;
  --silver: #e8eaf0;
  --silver-mid: #c5c9d8;
  --white: #f9fafc;
  --text: #1a1f2e;
  --muted: #6b7280;
  --green: #16a34a; --green-light: #dcfce7;
  --blue: #1d4ed8; --blue-light: #dbeafe;
  --amber: #d97706; --amber-light: #fef3c7;
  --danger: #dc2626; --danger-light: #fee2e2;
  --r: 6px; --sh: 0 2px 8px rgba(0,0,0,.12); --shl: 0 8px 24px rgba(0,0,0,.22);
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Barlow',sans-serif; background:var(--silver); color:var(--text); min-height:100vh; }

/* LOGIN */
#login-screen { min-height:100vh; background:var(--gun); display:flex; align-items:center; justify-content:center; }
.login-box { background:var(--white); border-radius:12px; padding:40px 36px; width:400px; box-shadow:var(--shl); text-align:center; }
.login-logo img { width:220px; max-width:100%; margin-bottom:8px; }
.login-sub { font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:28px; }
.dept-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.dept-btn { padding:13px 10px; border-radius:var(--r); border:2px solid var(--silver); background:white; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px; cursor:pointer; color:var(--gun); transition:all .15s; }
.dept-btn:hover { border-color:var(--yellow); background:var(--yellow-light); }
.dept-btn.full { grid-column:1/-1; }
.divider { text-align:center; margin:14px 0 10px; font-size:12px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
.disp-btn { display:block; width:100%; padding:13px; background:var(--gun); color:white; border:none; border-radius:var(--r); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; letter-spacing:1px; cursor:pointer; transition:background .15s; }
.disp-btn:hover { background:var(--yellow-dark); color:var(--gun); }
.disp-panel { display:none; margin-top:14px; }
.disp-panel.open { display:block; }
.disp-panel input { width:100%; padding:11px 14px; border:1.5px solid var(--silver); border-radius:var(--r); font-size:14px; margin-bottom:10px; outline:none; font-family:'Barlow',sans-serif; }
.disp-panel input:focus { border-color:var(--yellow); }
.login-submit { width:100%; padding:12px; background:var(--yellow); color:var(--gun); border:none; border-radius:var(--r); font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:16px; cursor:pointer; letter-spacing:.5px; }
.login-submit:hover { background:var(--yellow-dark); }
.login-err { color:var(--danger); font-size:13px; margin-top:6px; display:none; }
.login-back { color:var(--muted); font-size:13px; cursor:pointer; display:inline-block; margin-top:10px; }
.login-back:hover { color:var(--gun); }

/* HEADER */
header { background:var(--gun); color:white; display:flex; align-items:center; justify-content:space-between; padding:0 20px; height:60px; box-shadow:var(--shl); position:sticky; top:0; z-index:100; }
.hdr-logo img { height:46px; }
.hdr-right { display:flex; align-items:center; gap:12px; }
.user-badge { font-size:13px; color:#aaa; }
.btn-logout { background:var(--gun-light); border:none; color:white; padding:6px 14px; border-radius:var(--r); font-size:13px; cursor:pointer; }
.btn-logout:hover { background:var(--yellow); color:var(--gun); }

/* TABS */
.nav-tabs { background:var(--gun-mid); display:flex; gap:2px; padding:0 20px; overflow-x:auto; }
.nav-tab { padding:10px 18px; font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:14px; letter-spacing:.5px; color:#aaa; cursor:pointer; border-bottom:3px solid transparent; transition:all .15s; text-transform:uppercase; white-space:nowrap; }
.nav-tab:hover { color:white; }
.nav-tab.active { color:var(--yellow); border-bottom-color:var(--yellow); }

/* MAIN */
main { padding:24px; max-width:1300px; margin:0 auto; }
.section-hidden { display:none !important; }
.app-hidden { display:none !important; }

/* CARDS */
.card { background:white; border-radius:var(--r); box-shadow:var(--sh); padding:24px; margin-bottom:20px; }
.card-title { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:18px; letter-spacing:.5px; color:var(--gun); margin-bottom:20px; padding-bottom:12px; border-bottom:2px solid var(--silver); text-transform:uppercase; }

/* FORM */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.form-grid .full { grid-column:1/-1; }
.form-group { display:flex; flex-direction:column; gap:6px; }
label { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.5px; text-transform:uppercase; }
input, select, textarea { padding:10px 12px; border:1.5px solid var(--silver); border-radius:var(--r); font-family:'Barlow',sans-serif; font-size:14px; color:var(--text); outline:none; transition:border-color .15s; background:white; width:100%; }
input:focus, select:focus, textarea:focus { border-color:var(--yellow); }
textarea { resize:vertical; min-height:80px; }
.show-other { display:none; margin-top:8px; }
.show-other.vis { display:block; }

/* BUTTONS */
.btn { padding:10px 20px; border-radius:var(--r); border:none; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px; letter-spacing:.5px; cursor:pointer; transition:all .15s; }
.btn-primary { background:var(--yellow); color:var(--gun); }
.btn-primary:hover { background:var(--yellow-dark); }
.btn-secondary { background:var(--silver); color:var(--gun); }
.btn-secondary:hover { background:var(--silver-mid); }
.btn-sm { padding:5px 11px; font-size:12px; }

/* BADGES */
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; font-family:'Barlow Condensed',sans-serif; letter-spacing:.5px; text-transform:uppercase; }
.b-pending { background:var(--amber-light); color:var(--amber); }
.b-scheduled { background:var(--blue-light); color:var(--blue); }
.b-delivered { background:var(--green-light); color:var(--green); }
.b-overdue { background:var(--danger-light); color:var(--danger); }
.b-cancelled { background:var(--silver); color:var(--muted); }

/* SUMMARY CARDS */
.summary-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
.sum-card { background:white; border-radius:var(--r); padding:16px 20px; box-shadow:var(--sh); border-left:4px solid transparent; }
.sum-card.pending { border-left-color:var(--amber); }
.sum-card.scheduled { border-left-color:var(--blue); }
.sum-card.overdue { border-left-color:var(--danger); }
.sum-card.delivered { border-left-color:var(--green); }
.sum-num { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:36px; line-height:1; color:var(--gun); }
.sum-lbl { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-top:4px; }

/* TABLE */
.board-toolbar { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
.board-toolbar input, .board-toolbar select { width:auto; padding:7px 11px; font-size:13px; }
.filter-lbl { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead tr { background:var(--gun); color:white; }
thead th { padding:10px 12px; text-align:left; font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:13px; letter-spacing:.5px; text-transform:uppercase; white-space:nowrap; }
tbody tr { border-bottom:1px solid var(--silver); transition:background .1s; }
tbody tr:hover { background:#fffbea; }
tbody tr.overdue-row { background:#fff5f5; }
tbody td { padding:9px 12px; vertical-align:middle; }
.td-job { font-weight:600; color:var(--gun); }
.td-muted { color:var(--muted); font-size:12px; }
.table-wrap { overflow-x:auto; }

/* MODAL */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:white; border-radius:10px; width:560px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:var(--shl); }
.modal-hdr { background:var(--gun); color:white; padding:16px 20px; border-radius:10px 10px 0 0; display:flex; align-items:center; justify-content:space-between; }
.modal-hdr h3 { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:18px; text-transform:uppercase; }
.modal-close { background:none; border:none; color:white; font-size:20px; cursor:pointer; line-height:1; }
.modal-body { padding:24px; }
.modal-footer { padding:16px 24px; border-top:1px solid var(--silver); display:flex; gap:10px; justify-content:flex-end; }

/* DETAIL */
.det-row { display:flex; gap:8px; margin-bottom:11px; align-items:flex-start; }
.det-lbl { font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; min-width:130px; padding-top:2px; }
.det-val { font-size:14px; color:var(--text); flex:1; }

/* FILE UPLOAD */
.file-drop { border:2px dashed var(--silver-mid); border-radius:var(--r); padding:18px; text-align:center; cursor:pointer; transition:border-color .15s; font-size:13px; color:var(--muted); }
.file-drop:hover, .file-drop.drag { border-color:var(--yellow); color:var(--gun); }
.file-drop input { display:none; }
.file-item { display:flex; align-items:center; justify-content:space-between; padding:6px 10px; background:var(--silver); border-radius:4px; margin-top:6px; font-size:12px; }
.file-remove { cursor:pointer; color:var(--danger); font-weight:700; background:none; border:none; font-size:14px; }

/* REPORTS */
.report-stat { background:white; border-radius:var(--r); padding:20px; box-shadow:var(--sh); text-align:center; }
.report-stat-num { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:42px; color:var(--gun); }
.report-stat-lbl { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-top:4px; }

/* TOAST */
.toast { position:fixed; bottom:24px; right:24px; background:var(--gun); color:white; padding:12px 20px; border-radius:var(--r); font-size:14px; box-shadow:var(--shl); z-index:9999; opacity:0; transform:translateY(10px); transition:all .3s; pointer-events:none; }
.toast.show { opacity:1; transform:translateY(0); }
.toast.ok { border-left:4px solid var(--green); }
.toast.err { border-left:4px solid var(--danger); }

/* LOADING */
.loading { text-align:center; padding:40px; color:var(--muted); font-size:14px; }
.spinner { display:inline-block; width:24px; height:24px; border:3px solid var(--silver); border-top-color:var(--yellow); border-radius:50%; animation:spin .8s linear infinite; margin-right:8px; vertical-align:middle; }
@keyframes spin { to { transform:rotate(360deg); } }

/* PRINT */
@media print {
  header, .nav-tabs, .board-toolbar, .btn, .summary-row, #login-screen, .modal-overlay { display:none !important; }
  body { background:white; }
  .card { box-shadow:none; border:1px solid #ddd; }
}

@media (max-width:700px) {
  .form-grid, .summary-row { grid-template-columns:1fr; }
  main { padding:12px; }
  .dept-grid { grid-template-columns:1fr; }
}
</style>
</head>

async function sb(method,table,body,params=''){
  const res=await fetch(`${SB_URL}/rest/v1/${table}${params}`,{method,headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'},body:body?JSON.stringify(body):undefined});

}
const get=(table,params='')=>sb('GET',table,null,params);
const post=(table,body)=>sb('POST',table,body);
const patch=(table,body,params)=>sb('PATCH',table,body,params);

let user=null,editingId=null,viewingId=null,attachedFiles=[];

function showDispPanel(){document.getElementById('dept-panel').style.display='none';document.getElementById('disp-panel').classList.add('open');document.getElementById('login-user').focus();}
function showDeptPanel(){document.getElementById('dept-panel').style.display='block';document.getElementById('disp-panel').classList.remove('open');}
function showOtherDept(){document.getElementById('other-dept-wrap').style.display='block';document.getElementById('other-dept-input').focus();}
function deptLogin(dept){user={role:'dept',dept,name:dept};enterApp();}
function otherDeptLogin(){const dept=document.getElementById('other-dept-input').value.trim();if(!dept)return;user={role:'dept',dept,name:dept};enterApp();}
async function doLogin(){
  const username=document.getElementById('login-user').value.trim().toLowerCase();
  const password=document.getElementById('login-pass').value;
  document.getElementById('login-err').style.display='none';
  try{
    const rows=await get('dispatchers',`?username=eq.${username}&active=eq.true`);
    if(!rows.length||rows[0].password_hash!==password){document.getElementById('login-err').style.display='block';return;}
    const d=rows[0];user={role:d.role,name:d.full_name,id:d.id,dept:null};enterApp();
  }catch(e){document.getElementById('login-err').style.display='block';}
}
function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.remove('app-hidden');
  document.getElementById('user-badge').textContent=user.name;
  buildNav();
}
function logout(){user=null;attachedFiles=[];document.getElementById('login-screen').style.display='flex';document.getElementById('app').classList.add('app-hidden');document.getElementById('login-user').value='';document.getElementById('login-pass').value='';showDeptPanel();}

function buildNav(){
  const nav=document.getElementById('nav-tabs');
  let tabs=[];
  if(user.role==='dept'){tabs=[{id:'submit',label:'+ New Request'},{id:'my-requests',label:'My Requests'}];}
  else{
    tabs=[{id:'board',label:'📋 Dispatch Board'},{id:'runsheet',label:'🖨 Run Sheet'},{id:'submit',label:'+ New Request'}];
    if(user.role==='admin'){tabs.push({id:'reports',label:'📊 Reports'});tabs.push({id:'admin',label:'⚙️ Admin'});}
  }
  nav.innerHTML=tabs.map(t=>`<div class="nav-tab" id="tab-${t.id}" onclick="showTab('${t.id}')">${t.label}</div>`).join('');
  showTab(tabs[0].id);
}

function showTab(tab){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  const el=document.getElementById('tab-'+tab);if(el)el.classList.add('active');
  const main=document.getElementById('main-content');
  const renders={submit:renderSubmit,'my-requests':renderMyRequests,board:renderBoard,runsheet:renderRunSheet,reports:renderReports,admin:renderAdmin};
  if(renders[tab]){main.innerHTML='<div class="loading"><span class="spinner"></span> Loading...</div>';renders[tab]();}
}

function deptOther(){const v=document.getElementById('f-dept').value;const o=document.getElementById('f-dept-other');v==='Other'?o.classList.add('vis'):o.classList.remove('vis');}
function driverOther(){const v=document.getElementById('m-driver').value;const o=document.getElementById('m-driver-other');v==='Shop / Other'?o.classList.add('vis'):o.classList.remove('vis');}
function handleFiles(files){Array.from(files).forEach(f=>attachedFiles.push({name:f.name,size:f.size}));renderFileList();}
function renderFileList(){const el=document.getElementById('file-list');if(!el)return;el.innerHTML=attachedFiles.map((f,i)=>`<div class="file-item"><span>📎 ${esc(f.name)}</span><button class="file-remove" onclick="removeFile(${i})">✕</button></div>`).join('');}
function removeFile(i){attachedFiles.splice(i,1);renderFileList();}
function clearSubmitForm(){['f-job','f-wo','f-fab','f-addr','f-contact','f-weight','f-notes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});const fd=document.getElementById('f-date');if(fd)fd.value=today();const ft=document.getElementById('f-type');if(ft)ft.value='';attachedFiles=[];renderFileList();}

async function submitRequest(){
  let dept=document.getElementById('f-dept').value;
  if(dept==='Other')dept=(document.getElementById('f-dept-other').value||'').trim();
  const date=document.getElementById('f-date').value;
  const job=document.getElementById('f-job').value.trim();
  if(!dept){toast('Please select a department.','err');return;}
  if(!date){toast('Please select a delivery date.','err');return;}
  if(!job){toast('Please enter a job name.','err');return;}
  const btn=document.querySelector('#main-content .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Submitting…';}
  const body={dept,delivery_date:date,job_name:job,wo_number:document.getElementById('f-wo').value.trim(),fab_pro:document.getElementById('f-fab').value.trim(),delivery_type:document.getElementById('f-type').value,address:document.getElementById('f-addr').value.trim(),site_contact:document.getElementById('f-contact').value.trim(),weight_notes:document.getElementById('f-weight').value.trim(),special_notes:document.getElementById('f-notes').value.trim(),attachments:attachedFiles,status:'Pending',submitted_by:user.name};
  try{await post('delivery_requests',body);toast('Request submitted!','ok');clearSubmitForm();if(user.role==='dept')showTab('my-requests');}
  catch(e){toast('Error submitting. Try again.','err');}
  finally{if(btn){btn.disabled=false;btn.textContent='Submit Request';}}
}

async function renderMyRequests(){
  let rows;
  try{rows=await get('delivery_requests',`?dept=eq.${encodeURIComponent(user.dept)}&order=delivery_date.asc`);}
  catch(e){document.getElementById('main-content').innerHTML='<div class="card"><p style="color:var(--danger)">Error loading requests.</p></div>';return;}
  document.getElementById('main-content').innerHTML=`
  <div class="card"><div class="card-title">My Department Requests — ${esc(user.dept)}</div>
  <div class="board-toolbar"><span class="filter-lbl">Status:</span>
    <select onchange="filterMyRequests(this.value,'${user.dept}')">
      <option value="">All</option><option>Pending</option><option>Scheduled</option><option>Delivered</option><option>Cancelled</option>
    </select>
  </div>${tableHtml(rows,false)}</div>`;
}

async function filterMyRequests(status,dept){
  let params=`?dept=eq.${encodeURIComponent(dept)}&order=delivery_date.asc`;
  if(status)params+=`&status=eq.${status}`;
  const rows=await get('delivery_requests',params);
  const card=document.querySelector('#main-content .card');
  if(card)card.innerHTML=`<div class="card-title">My Department Requests — ${dept}</div><div class="board-toolbar"><span class="filter-lbl">Status:</span><select onchange="filterMyRequests(this.value,'${dept}')"><option value="">All</option><option>Pending</option><option>Scheduled</option><option>Delivered</option><option>Cancelled</option></select></div>${tableHtml(rows,false)}`;
}

async function renderBoard(){
  let rows;
  try{rows=await get('delivery_requests','?order=delivery_date.asc');}
  catch(e){document.getElementById('main-content').innerHTML='<div class="card"><p style="color:var(--danger)">Error loading board.</p></div>';return;}
  const pending=rows.filter(r=>r.status==='Pending').length;
  const scheduled=rows.filter(r=>r.status==='Scheduled').length;
  const overdue=rows.filter(r=>isOverdue(r)).length;
  const delivered=rows.filter(r=>r.status==='Delivered').length;
  document.getElementById('main-content').innerHTML=`
  <div class="summary-row">
    <div class="sum-card pending"><div class="sum-num">${pending}</div><div class="sum-lbl">Pending</div></div>
    <div class="sum-card scheduled"><div class="sum-num">${scheduled}</div><div class="sum-lbl">Scheduled</div></div>
    <div class="sum-card overdue"><div class="sum-num">${overdue}</div><div class="sum-lbl">Overdue</div></div>
    <div class="sum-card delivered"><div class="sum-num">${delivered}</div><div class="sum-lbl">Delivered</div></div>
  </div>
  <div class="card"><div class="card-title">Dispatch Board</div>
  <div class="board-toolbar">
    <span class="filter-lbl">Date:</span><input type="date" id="bd-date" onchange="applyBoardFilter()">
    <span class="filter-lbl">Status:</span>
    <select id="bd-status" onchange="applyBoardFilter()"><option value="">All</option><option>Pending</option><option>Scheduled</option><option>Delivered</option><option>Overdue</option><option>Cancelled</option></select>
    <span class="filter-lbl">Driver:</span>
    <select id="bd-driver" onchange="applyBoardFilter()"><option value="">All Drivers</option><option>Bob Johnson</option><option>Brandon Jones</option><option>Michael Gropp</option><option>Ron Gibson</option><option>Ray Swimm</option><option>Shop / Other</option></select>
    <button class="btn btn-secondary btn-sm" onclick="renderBoard()">Clear</button>
    <button class="btn btn-primary btn-sm" onclick="showTab('runsheet')">🖨 Run Sheet</button>
  </div>
  <div class="table-wrap" id="board-table">${boardTableHtml(rows)}</div></div>`;
}

function applyBoardFilter(){
  const date=document.getElementById('bd-date').value;
  const status=document.getElementById('bd-status').value;
  const driver=document.getElementById('bd-driver').value;
  let params='?order=delivery_date.asc';
  if(date)params+=`&delivery_date=eq.${date}`;
  if(status&&status!=='Overdue')params+=`&status=eq.${status}`;
  if(driver)params+=`&driver=eq.${encodeURIComponent(driver)}`;
  get('delivery_requests',params).then(rows=>{
    let filtered=rows;
    if(status==='Overdue')filtered=rows.filter(r=>isOverdue(r));
    document.getElementById('board-table').innerHTML=boardTableHtml(filtered);
  });
}

function boardTableHtml(rows){
  if(!rows.length)return'<p style="color:var(--muted);padding:20px 0;">No deliveries match the current filters.</p>';
  return`<table><thead><tr><th>Date</th><th>Dept</th><th>Job</th><th>WO #</th><th>Fab Pro</th><th>Type</th><th>Address</th><th>Contact</th><th>Weight</th><th>Status</th><th>Driver</th><th>Truck</th><th>Trailer</th><th>Time</th><th></th></tr></thead>
  <tbody>${rows.map(r=>`<tr class="${isOverdue(r)?'overdue-row':''}">
    <td style="white-space:nowrap;">${fmtDate(r.delivery_date)}</td>
    <td class="td-muted">${esc(r.dept)}</td><td class="td-job">${esc(r.job_name)}</td>
    <td class="td-muted">${esc(r.wo_number)||'—'}</td><td class="td-muted">${esc(r.fab_pro)||'—'}</td>
    <td style="white-space:nowrap;">${esc(r.delivery_type)||'—'}</td>
    <td style="max-width:150px;font-size:12px;">${esc(r.address)||'—'}</td>
    <td>${esc(r.site_contact)||'—'}</td><td>${esc(r.weight_notes)||'—'}</td>
    <td>${badgeHtml(r)}</td><td>${r.driver?esc(r.driver):'<span class="td-muted">—</span>'}</td>
    <td>${r.truck?esc(r.truck):'<span class="td-muted">—</span>'}</td>
    <td>${r.trailer?esc(r.trailer):'<span class="td-muted">—</span>'}</td>
    <td>${r.confirmed_time?fmtTime(r.confirmed_time):'<span class="td-muted">TBD</span>'}</td>
    <td style="white-space:nowrap;"><button class="btn btn-primary btn-sm" onclick="openAssign('${r.id}')">Assign</button> <button class="btn btn-secondary btn-sm" onclick="viewRequest('${r.id}')">View</button></td>
  </tr>`).join('')}</tbody></table>`;
}

async function renderRunSheet(){
  document.getElementById('main-content').innerHTML=`
  <div class="card"><div class="card-title">Daily Run Sheet</div>
  <div class="board-toolbar">
    <span class="filter-lbl">Date:</span><input type="date" id="rs-date" value="${today()}" onchange="loadRunSheet()">
    <span class="filter-lbl">Driver:</span>
    <select id="rs-driver" onchange="loadRunSheet()"><option value="">All Drivers</option><option>Bob Johnson</option><option>Brandon Jones</option><option>Michael Gropp</option><option>Ron Gibson</option><option>Ray Swimm</option><option>Shop / Other</option></select>
    <button class="btn btn-primary btn-sm" onclick="window.print()">🖨 Print</button>
  </div>
  <div id="rs-content"><div class="loading"><span class="spinner"></span> Loading...</div></div></div>`;
  loadRunSheet();
}

async function loadRunSheet(){
  const date=document.getElementById('rs-date').value;
  const driver=document.getElementById('rs-driver').value;
  let params=`?delivery_date=eq.${date}&status=neq.Cancelled&order=confirmed_time.asc.nullslast`;
  if(driver)params+=`&driver=eq.${encodeURIComponent(driver)}`;
  const rows=await get('delivery_requests',params);
  const byDriver={};rows.forEach(r=>{const d=r.driver||'Unassigned';if(!byDriver[d])byDriver[d]=[];byDriver[d].push(r);});
  const el=document.getElementById('rs-content');
  if(!rows.length){el.innerHTML='<p style="color:var(--muted);padding:20px 0;">No deliveries scheduled for this date.</p>';return;}
  el.innerHTML=Object.entries(byDriver).map(([driverName,runs])=>`
    <div style="margin-bottom:32px;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:var(--gun);border-bottom:3px solid var(--yellow);padding-bottom:8px;margin-bottom:16px;text-transform:uppercase;">
        ${driverName?esc(driverName):'Unassigned'}${runs[0].truck?' — Truck #'+esc(runs[0].truck):''}${runs[0].trailer?' | Trailer #'+esc(runs[0].trailer):''}
        <span style="font-size:14px;font-weight:400;color:var(--muted);margin-left:12px;">${fmtDate(date)}</span>
      </div>
      <div class="table-wrap"><table><thead><tr><th>#</th><th>Time</th><th>Job</th><th>WO / Fab Pro</th><th>Type</th><th>Address</th><th>Contact</th><th>Weight</th><th>Notes</th><th>Attachments</th></tr></thead>
      <tbody>${runs.map((r,i)=>`<tr>
        <td style="font-weight:700;color:var(--yellow-dark);">${i+1}</td>
        <td style="font-weight:700;white-space:nowrap;">${r.confirmed_time?fmtTime(r.confirmed_time):'TBD'}</td>
        <td class="td-job">${esc(r.job_name)}</td>
        <td class="td-muted">${[r.wo_number,r.fab_pro].filter(Boolean).map(esc).join(' / ')||'—'}</td>
        <td>${esc(r.delivery_type)||'—'}</td>
        <td style="font-size:12px;">${esc(r.address)||'—'}</td>
        <td>${esc(r.site_contact)||'—'}</td><td>${esc(r.weight_notes)||'—'}</td>
        <td style="font-size:12px;">${[r.special_notes,r.dispatcher_notes].filter(Boolean).map(esc).join(' | ')||'—'}</td>
        <td>${r.attachments&&r.attachments.length?r.attachments.map(a=>'📎 '+esc(a.name)).join('<br>'):'—'}</td>
      </tr>`).join('')}</tbody></table></div></div>`).join('');
}

    <div class="det-row"><span class="det-lbl">Dept</span><span class="det-val">${esc(r.dept)}</span></div>
    <div class="det-row"><span class="det-lbl">Requested Date</span><span class="det-val">${fmtDate(r.delivery_date)}</span></div>
    <div class="det-row"><span class="det-lbl">WO / Fab Pro</span><span class="det-val">${[r.wo_number,r.fab_pro].filter(Boolean).map(esc).join(' / ')||'—'}</span></div>
    <div class="det-row"><span class="det-lbl">Type</span><span class="det-val">${esc(r.delivery_type)||'—'}</span></div>

    <div class="det-row"><span class="det-lbl">Dept Notes</span><span class="det-val">${esc(r.special_notes)||'—'}</span></div>
    ${r.attachments&&r.attachments.length?`<div class="det-row"><span class="det-lbl">Attachments</span><span class="det-val">${r.attachments.map(a=>'📎 '+esc(a.name)).join('<br>')}</span></div>`:''}`;

async function saveAssign(){
  let driver=document.getElementById('m-driver').value;
  if(driver==='Shop / Other'){const o=document.getElementById('m-driver-other').value.trim();if(o)driver=o;}
  const status=document.getElementById('m-status').value;
  const delivDate=document.getElementById('m-date').value;
  if(status==='Scheduled'&&!driver){toast('Please assign a driver before marking Scheduled.','err');return;}
  if(!delivDate){toast('Please set a delivery date.','err');return;}
  const btn=document.getElementById('assign-save-btn');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  const body={driver,truck:document.getElementById('m-truck').value.trim(),trailer:document.getElementById('m-trailer').value.trim(),confirmed_time:document.getElementById('m-time').value,status,dispatcher_notes:document.getElementById('m-notes').value.trim(),delivery_date:delivDate,updated_at:new Date().toISOString()};
  try{await patch('delivery_requests',body,`?id=eq.${editingId}`);closeModal('assign-modal');toast('Assignment saved!','ok');renderBoard();}
  catch(e){toast('Error saving. Try again.','err');}
  finally{if(btn){btn.disabled=false;btn.textContent='Save Assignment';}}
}

    <div class="det-row"><span class="det-lbl">Truck #</span><span class="det-val">${esc(r.truck)||'—'}</span></div>
    <div class="det-row"><span class="det-lbl">Trailer #</span><span class="det-val">${esc(r.trailer)||'—'}</span></div>
    <div class="det-row"><span class="det-lbl">Confirmed Time</span><span class="det-val">${r.confirmed_time?fmtTime(r.confirmed_time):'TBD'}</span></div>
    ${(user.role==='dispatcher'||user.role==='admin')&&r.dispatcher_notes?`<div class="det-row"><span class="det-lbl">Dispatcher Notes</span><span class="det-val">${esc(r.dispatcher_notes)}</span></div>`:''}
    <div class="det-row"><span class="det-lbl">Submitted</span><span class="det-val">${new Date(r.submitted_at).toLocaleString()}</span></div>`;

}

async function openEditModal(id){

async function saveEdit(){
  const job=document.getElementById('e-job').value.trim();
  const date=document.getElementById('e-date').value;
  if(!job){toast('Job name cannot be empty.','err');return;}
  if(!date){toast('Delivery date cannot be empty.','err');return;}
  const body={delivery_date:date,delivery_type:document.getElementById('e-type').value,job_name:job,wo_number:document.getElementById('e-wo').value.trim(),fab_pro:document.getElementById('e-fab').value.trim(),address:document.getElementById('e-addr').value.trim(),site_contact:document.getElementById('e-contact').value.trim(),weight_notes:document.getElementById('e-weight').value.trim(),special_notes:document.getElementById('e-notes').value.trim(),updated_at:new Date().toISOString()};

  <div class="card"><div class="card-title">Reports</div>
  <div class="board-toolbar">
    <span class="filter-lbl">From:</span><input type="date" id="rp-from">
    <span class="filter-lbl">To:</span><input type="date" id="rp-to" value="${today()}">

let reportData=[];
async function loadReports(){
  const from=document.getElementById('rp-from').value;
  const to=document.getElementById('rp-to').value;
  const type=document.getElementById('rp-type')?document.getElementById('rp-type').value:'summary';
  if(!from||!to){toast('Set both dates.','err');return;}
  if(from>to){toast('Start date must be before end date.','err');return;}
  reportData=await get('delivery_requests',`?delivery_date=gte.${from}&delivery_date=lte.${to}&order=delivery_date.asc`);
  const rows=reportData;
  const el=document.getElementById('rp-content');

  // Always show summary stats at top
  const total=rows.length;
  const delivered=rows.filter(r=>r.status==='Delivered').length;
  const pending=rows.filter(r=>r.status==='Pending').length;
  const cancelled=rows.filter(r=>r.status==='Cancelled').length;
  const overdue=rows.filter(r=>isOverdue(r)).length;
  const statsHtml=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:24px;">
    <div class="report-stat"><div class="report-stat-num">${total}</div><div class="report-stat-lbl">Total</div></div>
    <div class="report-stat"><div class="report-stat-num" style="color:var(--green)">${delivered}</div><div class="report-stat-lbl">Delivered</div></div>
    <div class="report-stat"><div class="report-stat-num" style="color:var(--amber)">${pending}</div><div class="report-stat-lbl">Pending</div></div>
    <div class="report-stat"><div class="report-stat-num" style="color:var(--danger)">${overdue}</div><div class="report-stat-lbl">Overdue</div></div>
    <div class="report-stat"><div class="report-stat-num" style="color:var(--muted)">${cancelled}</div><div class="report-stat-lbl">Cancelled</div></div>
  </div>`;

  if(type==='summary'){
    const byDriver={};rows.forEach(r=>{const d=r.driver||'Unassigned';byDriver[d]=(byDriver[d]||0)+1;});
    const byDept={};rows.forEach(r=>{byDept[r.dept]=(byDept[r.dept]||0)+1;});
    el.innerHTML=statsHtml+`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;">
      <div><div class="card-title" style="font-size:14px;margin-bottom:12px;">By Driver</div>
        <table><thead><tr><th>Driver</th><th>Stops</th></tr></thead>
        <tbody>${Object.entries(byDriver).sort((a,b)=>b[1]-a[1]).map(([d,n])=>`<tr><td>${esc(d)}</td><td style="font-weight:700;">${n}</td></tr>`).join('')}</tbody></table>
      </div>
      <div><div class="card-title" style="font-size:14px;margin-bottom:12px;">By Department</div>
        <table><thead><tr><th>Department</th><th>Requests</th></tr></thead>
        <tbody>${Object.entries(byDept).sort((a,b)=>b[1]-a[1]).map(([d,n])=>`<tr><td>${esc(d)}</td><td style="font-weight:700;">${n}</td></tr>`).join('')}</tbody></table>
      </div>
    </div>`;

  } else if(type==='driver'){
    const byDriver={};
    rows.forEach(r=>{const d=r.driver||'Unassigned';if(!byDriver[d])byDriver[d]=[];byDriver[d].push(r);});
    el.innerHTML=statsHtml+Object.entries(byDriver).sort((a,b)=>b[1].length-a[1].length).map(([driver,jobs])=>`
      <div style="margin-bottom:24px;">
        <div class="card-title" style="font-size:15px;margin-bottom:10px;">🚚 ${esc(driver)} — ${jobs.length} stop${jobs.length!==1?'s':''}</div>
        <div class="table-wrap"><table><thead><tr><th>Date</th><th>Job</th><th>Dept</th><th>Type</th><th>Truck</th><th>Trailer</th><th>Status</th></tr></thead>
        <tbody>${jobs.map(r=>`<tr><td>${fmtDate(r.delivery_date)}</td><td class="td-job">${esc(r.job_name)}</td><td class="td-muted">${esc(r.dept)}</td><td>${esc(r.delivery_type)||'—'}</td><td>${esc(r.truck)||'—'}</td><td>${esc(r.trailer)||'—'}</td><td>${badgeHtml(r)}</td></tr>`).join('')}</tbody></table></div>
      </div>`).join('');

  } else if(type==='truck'){
    const byTruck={};
    rows.forEach(r=>{const t=r.truck||'No Truck Assigned';if(!byTruck[t])byTruck[t]=[];byTruck[t].push(r);});
    el.innerHTML=statsHtml+Object.entries(byTruck).sort((a,b)=>b[1].length-a[1].length).map(([truck,jobs])=>`
      <div style="margin-bottom:24px;">
        <div class="card-title" style="font-size:15px;margin-bottom:10px;">🚛 Truck #${esc(truck)} — ${jobs.length} run${jobs.length!==1?'s':''}</div>
        <div class="table-wrap"><table><thead><tr><th>Date</th><th>Driver</th><th>Job</th><th>Dept</th><th>Type</th><th>Status</th></tr></thead>
        <tbody>${jobs.map(r=>`<tr><td>${fmtDate(r.delivery_date)}</td><td>${esc(r.driver)||'—'}</td><td class="td-job">${esc(r.job_name)}</td><td class="td-muted">${esc(r.dept)}</td><td>${esc(r.delivery_type)||'—'}</td><td>${badgeHtml(r)}</td></tr>`).join('')}</tbody></table></div>
      </div>`).join('');

  } else if(type==='trailer'){
    const byTrailer={};
    rows.forEach(r=>{const t=r.trailer||'No Trailer Assigned';if(!byTrailer[t])byTrailer[t]=[];byTrailer[t].push(r);});
    el.innerHTML=statsHtml+Object.entries(byTrailer).sort((a,b)=>b[1].length-a[1].length).map(([trailer,jobs])=>`
      <div style="margin-bottom:24px;">
        <div class="card-title" style="font-size:15px;margin-bottom:10px;">🔗 Trailer #${esc(trailer)} — ${jobs.length} run${jobs.length!==1?'s':''}</div>
        <div class="table-wrap"><table><thead><tr><th>Date</th><th>Driver</th><th>Truck</th><th>Job</th><th>Dept</th><th>Status</th></tr></thead>
        <tbody>${jobs.map(r=>`<tr><td>${fmtDate(r.delivery_date)}</td><td>${esc(r.driver)||'—'}</td><td>${esc(r.truck)||'—'}</td><td class="td-job">${esc(r.job_name)}</td><td class="td-muted">${esc(r.dept)}</td><td>${badgeHtml(r)}</td></tr>`).join('')}</tbody></table></div>
      </div>`).join('');

  } else if(type==='dept'){
    const byDept={};
    rows.forEach(r=>{if(!byDept[r.dept])byDept[r.dept]=[];byDept[r.dept].push(r);});
    el.innerHTML=statsHtml+Object.entries(byDept).sort((a,b)=>b[1].length-a[1].length).map(([dept,jobs])=>`
      <div style="margin-bottom:24px;">
        <div class="card-title" style="font-size:15px;margin-bottom:10px;">🏢 ${esc(dept)} — ${jobs.length} request${jobs.length!==1?'s':''}</div>
        <div class="table-wrap"><table><thead><tr><th>Date</th><th>Job</th><th>Type</th><th>Driver</th><th>Status</th></tr></thead>
        <tbody>${jobs.map(r=>`<tr><td>${fmtDate(r.delivery_date)}</td><td class="td-job">${esc(r.job_name)}</td><td>${esc(r.delivery_type)||'—'}</td><td>${esc(r.driver)||'—'}</td><td>${badgeHtml(r)}</td></tr>`).join('')}</tbody></table></div>
      </div>`).join('');

  } else if(type==='type'){
    const byType={};
    rows.forEach(r=>{const t=r.delivery_type||'Unspecified';if(!byType[t])byType[t]=[];byType[t].push(r);});
    el.innerHTML=statsHtml+Object.entries(byType).sort((a,b)=>b[1].length-a[1].length).map(([dtype,jobs])=>`
      <div style="margin-bottom:24px;">
        <div class="card-title" style="font-size:15px;margin-bottom:10px;">📦 ${esc(dtype)} — ${jobs.length} job${jobs.length!==1?'s':''}</div>
        <div class="table-wrap"><table><thead><tr><th>Date</th><th>Job</th><th>Dept</th><th>Driver</th><th>Status</th></tr></thead>
        <tbody>${jobs.map(r=>`<tr><td>${fmtDate(r.delivery_date)}</td><td class="td-job">${esc(r.job_name)}</td><td class="td-muted">${esc(r.dept)}</td><td>${esc(r.driver)||'—'}</td><td>${badgeHtml(r)}</td></tr>`).join('')}</tbody></table></div>
      </div>`).join('');

  } else if(type==='rescheduled'){
    const rescheduled=rows.filter(r=>r.updated_at&&r.submitted_at&&new Date(r.updated_at).toDateString()!==new Date(r.submitted_at).toDateString());
    el.innerHTML=statsHtml+`
    <div class="card-title" style="font-size:15px;margin-bottom:12px;">📅 Rescheduled Jobs — ${rescheduled.length} found</div>
    <div class="table-wrap"><table><thead><tr><th>Delivery Date</th><th>Job</th><th>Dept</th><th>Driver</th><th>Submitted</th><th>Last Updated</th><th>Status</th></tr></thead>
    <tbody>${rescheduled.length?rescheduled.map(r=>`<tr><td>${fmtDate(r.delivery_date)}</td><td class="td-job">${esc(r.job_name)}</td><td class="td-muted">${esc(r.dept)}</td><td>${esc(r.driver)||'—'}</td><td class="td-muted">${new Date(r.submitted_at).toLocaleDateString()}</td><td class="td-muted">${new Date(r.updated_at).toLocaleDateString()}</td><td>${badgeHtml(r)}</td></tr>`).join(''):'<tr><td colspan="7" style="color:var(--muted);text-align:center;">No rescheduled jobs found</td></tr>'}</tbody></table></div>`;

  } else if(type==='workload'){
    const byDriver={};
    rows.forEach(r=>{
      const d=r.driver||'Unassigned';
      const wk=getWeek(r.delivery_date);
      if(!byDriver[d])byDriver[d]={};
      byDriver[d][wk]=(byDriver[d][wk]||0)+1;
    });
    const weeks=[...new Set(rows.map(r=>getWeek(r.delivery_date)))].sort();
    el.innerHTML=statsHtml+`
    <div class="card-title" style="font-size:15px;margin-bottom:12px;">📊 Driver Workload by Week</div>
    <div class="table-wrap"><table><thead><tr><th>Driver</th>${weeks.map(w=>`<th>Wk ${w}</th>`).join('')}<th>Total</th></tr></thead>
    <tbody>${Object.entries(byDriver).sort((a,b)=>Object.values(b[1]).reduce((s,n)=>s+n,0)-Object.values(a[1]).reduce((s,n)=>s+n,0)).map(([driver,wks])=>{
      const total=Object.values(wks).reduce((s,n)=>s+n,0);
      return`<tr><td style="font-weight:600;">${esc(driver)}</td>${weeks.map(w=>`<td style="text-align:center;">${wks[w]||'—'}</td>`).join('')}<td style="font-weight:700;color:var(--gun);">${total}</td></tr>`;
    }).join('')}</tbody></table></div>`;

  } else {
    el.innerHTML=statsHtml+`<div class="card-title" style="font-size:14px;margin-bottom:12px;">All Deliveries</div><div class="table-wrap">${tableHtml(rows,false)}</div>`;
  }
}

function getWeek(dateStr){
  if(!dateStr)return'?';
  const d=new Date(dateStr);
  const jan1=new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
}

function exportCSV(){
  if(!reportData.length){toast('Run a report first.','err');return;}
  const cols=['delivery_date','dept','job_name','wo_number','fab_pro','delivery_type','address','site_contact','weight_notes','status','driver','truck','trailer','confirmed_time','special_notes','dispatcher_notes','submitted_by','submitted_at'];
  const sanitize=v=>{const s=(v||'').toString().replace(/"/g,'""');return /^[=+\-@\t\r]/.test(s)?`"'${s}"`:`"${s}"`;};  
  const csv=[cols.join(','),...reportData.map(r=>cols.map(c=>sanitize(r[c])).join(','))].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`tcb_dispatch_report_${today()}.csv`;a.click();
}

function tableHtml(rows,isBoard=false){
  if(!rows.length)return'<p style="color:var(--muted);padding:20px 0;">No records found.</p>';
  return`<div class="table-wrap"><table><thead><tr><th>Date</th><th>Job</th><th>WO #</th><th>Fab Pro</th><th>Type</th><th>Status</th><th>Driver</th><th>Time</th><th></th></tr></thead>
  <tbody>${rows.map(r=>`<tr class="${isOverdue(r)?'overdue-row':''}">
    <td style="white-space:nowrap;">${fmtDate(r.delivery_date)}</td><td class="td-job">${esc(r.job_name)}</td>
    <td class="td-muted">${esc(r.wo_number)||'—'}</td><td class="td-muted">${esc(r.fab_pro)||'—'}</td>
    <td>${esc(r.delivery_type)||'—'}</td><td>${badgeHtml(r)}</td>
    <td>${r.driver?esc(r.driver):'<span class="td-muted">Unassigned</span>'}</td>
    <td>${r.confirmed_time?fmtTime(r.confirmed_time):'<span class="td-muted">TBD</span>'}</td>
    <td style="white-space:nowrap;">
      <button class="btn btn-secondary btn-sm" onclick="viewRequest('${r.id}')">View</button>
      ${r.status==='Pending'&&user.role==='dept'?`<button class="btn btn-primary btn-sm" onclick="editRequest('${r.id}')">Edit</button>`:''}
      ${(user.role==='dispatcher'||user.role==='admin')?`<button class="btn btn-primary btn-sm" onclick="openAssign('${r.id}')">Assign</button>`:''}
    </td>
  </tr>`).join('')}</tbody></table></div>`;
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
function isOverdue(r){return!['Delivered','Cancelled'].includes(r.status)&&r.delivery_date<today();}
function badgeHtml(r){
  if(isOverdue(r))return'<span class="badge b-overdue">Overdue</span>';
  const m={Pending:'b-pending',Scheduled:'b-scheduled',Delivered:'b-delivered',Cancelled:'b-cancelled'};
  return`<span class="badge ${m[r.status]||''}">${r.status}</span>`;
}
function today(){return new Date().toISOString().split('T')[0];}
function fmtDate(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${m}/${d}/${y}`;}
function fmtTime(t){if(!t)return'';const[h,min]=t.split(':');const hr=parseInt(h);const disp=hr===0?12:hr>12?hr-12:hr;return`${disp}:${min} ${hr>=12?'PM':'AM'}`;}
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast show ${type}`;setTimeout(()=>t.className='toast',3000);}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
